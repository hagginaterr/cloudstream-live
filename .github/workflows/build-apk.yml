name: Build CloudStream Live APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: cloudstream-live-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Stable Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build stable debug APK
        run: ./gradlew :app:assembleStableDebug --no-daemon --stacktrace

      - name: List APK outputs
        if: always()
        run: find app/build/outputs/apk -type f -name "*.apk" -print || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudStream-Live-stable-debug
          path: app/build/outputs/apk/stable/debug/*.apk
          if-no-files-found: error
          retention-days: 14
