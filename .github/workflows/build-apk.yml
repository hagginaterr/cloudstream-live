name: Build CloudStream Live APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - twitch-low-latency-v1

permissions:
  contents: read

jobs:
  build:
    name: Build Stable Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew :app:assembleStableDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CloudStream-Live-stable-debug
          path: app/build/outputs/apk/stable/debug/*.apk
          retention-days: 7
