name: Build CloudStream Live APK

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Build mode
        required: true
        default: apk
        type: choice
        options:
          - apk
          - check
  push:
    branches:
      - master
      - main
      - built-in-twitch-provider

permissions:
  contents: read

concurrency:
  group: cloudstream-live-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Stable Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref_name != 'built-in-twitch-provider' && github.ref_name != 'main' && github.ref_name != 'master' }}

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Generate public Twitch credentials
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          client_id = os.environ.get("TWITCH_CLIENT_ID", "").strip()
          if not client_id:
              raise SystemExit("Missing TWITCH_CLIENT_ID")

          out_dir = Path("app/src/main/java/recloudstream/twitchlivefavorites")
          out_dir.mkdir(parents=True, exist_ok=True)

          out = out_dir / "TwitchCredentials.kt"
          out.write_text(
              "package recloudstream.twitchlivefavorites\n\n"
              "/** Generated by GitHub Actions. Do not commit real credentials. */\n"
              "object TwitchCredentials {\n"
              f"    const val CLIENT_ID: String = {json.dumps(client_id)}\n"
              "    const val CLIENT_SECRET: String = \"\"\n"
              "}\n",
              encoding="utf-8",
          )

          print(f"Generated {out}")
          PY

      - name: Fast Kotlin and resource check
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'check' }}
        run: ./gradlew :app:processStableDebugResources :app:compileStableDebugKotlin --build-cache --no-daemon --stacktrace

      - name: Build stable debug APK
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'apk' }}
        run: ./gradlew :app:assembleStableDebug --build-cache --no-daemon --stacktrace

      - name: List APK outputs
        if: always()
        run: find app/build/outputs/apk -type f -name "*.apk" -print || true

      - name: Upload APK artifact
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: CloudStream-Live-stable-debug
          path: app/build/outputs/apk/stable/debug/*.apk
          if-no-files-found: error
          retention-days: 14